conventions:
  - name: "Dataclass"
    source: discovered
    match:
      any_of:
        - has_decorator: "dataclass"
    rules:
      prohibited_imports: [Base, a, backend-client, budget_allocator, hooks]
    description: "Discovered from 19 files sharing decorator: dataclass"
    compliance: 1.0
  - name: "Fixture"
    source: discovered
    match:
      any_of:
        - has_decorator: "pytest\.fixture"
        - file_path: "tests/.*\.py"
    rules:
      prohibited_imports: [a, backend-client, budget_allocator, discovery, hooks]
      allowed_paths: [tests/.*\.py]
    description: "Discovered from 4 files sharing decorator: pytest.fixture"
    compliance: 1.0
  - name: "Given"
    source: discovered
    match:
      any_of:
        - has_decorator: "given"
        - file_path: "ui/GitNexus/eval/tests/.*\.py"
    rules:
      prohibited_imports: [a, backend-client, budget_allocator, discovery, hooks]
      allowed_paths: [ui/GitNexus/eval/tests/.*\.py]
    description: "Discovered from 3 files sharing decorator: given"
    compliance: 1.0
  - name: "ABC Subclass"
    source: discovered
    match:
      any_of:
        - base_class: "ABC"
    rules:
      prohibited_imports: [a, backend-client, budget_allocator, discovery, hooks]
    description: "Discovered from 3 files sharing base_class: ABC"
    compliance: 1.0
  - name: "BaseAnalyzer Subclass"
    source: discovered
    match:
      any_of:
        - base_class: "BaseAnalyzer"
        - file_path: "dotscope/passes/lang/.*\.py"
    rules:
      required_methods: [analyze]
      prohibited_imports: [a, backend-client, budget_allocator, discovery, hooks]
      allowed_paths: [dotscope/passes/lang/.*\.py]
    description: "Discovered from 3 files sharing base_class: BaseAnalyzer"
    compliance: 1.0
  - name: "BaseModel Subclass"
    source: discovered
    match:
      any_of:
        - base_class: "BaseModel"
    rules:
      prohibited_imports: [a, backend-client, budget_allocator, discovery, hooks]
    description: "Discovered from 5 files sharing base_class: BaseModel"
    compliance: 1.0

voice:
  mode: prescriptive
  typing: |
    Type hints on all function signatures. Return types always specified.
  docstrings: |
    Google style. Imperative mood. One-line if the name explains it.
  error_handling: |
    Domain exceptions. No bare excepts. Let unexpected errors propagate.
  structure: |
    Early returns over nested conditionals. Guard clauses at the top.
  density: |
    Concise. Comprehensions where readable. No filler variables.
  comments: |
    Comments explain why, not what.
  imports: |
    stdlib first, third-party second, local third. One import per line.
  enforce:
    bare_excepts: "hold"
    missing_type_hints: "note"
