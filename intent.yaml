conventions:
  - name: "Dataclass"
    source: discovered
    match:
      any_of:
        - has_decorator: "dataclass"
    rules:
      prohibited_imports: [context, history_miner, swarm_state, textio, visibility]
      allowed_paths: [dotscope/[^/]+/.*\.py]
    description: "Discovered from 18 files sharing decorator: dataclass"
    compliance: 1.0
  - name: "Fixture"
    source: discovered
    match:
      any_of:
        - has_decorator: "pytest\.fixture"
        - file_path: "tests/.*\.py"
    rules:
      prohibited_imports: [context, history_miner, swarm_state, textio, visibility]
      allowed_paths: [tests/.*\.py]
    description: "Discovered from 4 files sharing decorator: pytest.fixture"
    compliance: 1.0
  - name: "PipelineStage Subclass"
    source: discovered
    match:
      any_of:
        - base_class: "PipelineStage"
        - file_path: "dotscope/mcp/.*\.py"
    rules:
      required_methods: [process]
      prohibited_imports: [context, history_miner, swarm_state, textio, visibility]
      allowed_paths: [dotscope/mcp/.*\.py]
    description: "Discovered from 8 files sharing base_class: PipelineStage"
    compliance: 0.8888888888888888
  - name: "BaseAnalyzer Subclass"
    source: discovered
    match:
      any_of:
        - base_class: "BaseAnalyzer"
        - file_path: "dotscope/passes/lang/.*\.py"
    rules:
      required_methods: [analyze]
      prohibited_imports: [context, history_miner, swarm_state, textio, visibility]
      allowed_paths: [dotscope/passes/lang/.*\.py]
    description: "Discovered from 5 files sharing base_class: BaseAnalyzer"
    compliance: 1.0

voice:
  mode: adaptive
  typing: |
    Strict type hints on all function signatures.
  docstrings: |
    Minimal docstrings. Add only when behavior is non-obvious.
  error_handling: |
    No bare excepts. Catch specific exception types.
  structure: |
    Match the pattern of the file being modified.
  density: |
    Comprehensions preferred where readable.
  enforce:
    bare_excepts: "hold"
    missing_type_hints: "note"
  stats:
    type_hint_rate: 0.9
    bare_except_rate: 0.01
    early_return_rate: 0.21
    docstring_count: 824
    dominant_docstring_style: "other"
    files_analyzed: 195
