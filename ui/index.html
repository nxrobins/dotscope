<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dotscope Topography</title>
  <style>
    body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #fallback { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 12px; backdrop-filter: blur(10px); 
                border: 1px solid rgba(255,255,255,0.1); text-align: center; }
  </style>
</head>
<body>
  <div id="fallback">
    <h3>Unsupported Browser</h3>
    <p>dotscope's hardware-accelerated physics engine requires a WebGPU-enabled browser (Chrome/Edge 113+ or Safari 18+).</p>
  </div>
  <canvas id="topo"></canvas>
  
  <script>
    // Intercepted and injected by Python cli/serve.py
    window.__DOTSCOPE_DATA__ = '__GRAPH_DATA_PAYLOAD__';
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
