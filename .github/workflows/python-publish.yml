name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: dist/

  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        target: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter
          target: ${{ matrix.target }}
          
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - sdist
      - build-wheels
    permissions:
      id-token: write

    environment:
      name: dotscope environment

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: release-sdist
          path: dist/
          
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: release-wheels-*
          path: dist/
          merge-multiple: true

      - name: List dist directory
        run: ls -la dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
